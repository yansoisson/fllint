name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14
    env:
      HAS_APPLE_CERTS: ${{ secrets.APPLE_CERTIFICATE_P12 != '' && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify tag version matches code
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CODE_VERSION=$(grep 'Version =' internal/version/version.go | head -1 | cut -d'"' -f2)
          if [ "$TAG_VERSION" != "$CODE_VERSION" ]; then
            echo "ERROR: Tag version ($TAG_VERSION) does not match code version ($CODE_VERSION)"
            echo "Update internal/version/version.go before tagging."
            exit 1
          fi
          echo "VERSION=$TAG_VERSION" >> $GITHUB_ENV

      - name: Patch Info.plist with release version
        run: |
          # Set CFBundleShortVersionString to the semver (e.g. "0.3.0")
          plutil -replace CFBundleShortVersionString -string "$VERSION" packaging/macos/Info.plist

          # Set CFBundleVersion to a unique build number (git commit count)
          BUILD_NUMBER=$(git rev-list --count HEAD)
          plutil -replace CFBundleVersion -string "$BUILD_NUMBER" packaging/macos/Info.plist

          echo "Info.plist patched: version=$VERSION build=$BUILD_NUMBER"
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV

      - name: Download Sparkle framework
        run: bash packaging/macos/download-sparkle.sh

      - name: Build macOS distribution
        run: make dist-macos

      - name: Install Apple certificate
        if: env.HAS_APPLE_CERTS == 'true'
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Create a temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Download and import Apple intermediate certificates (required for chain validation)
          curl -sL "https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer" -o "$RUNNER_TEMP/DeveloperIDG2CA.cer"
          security import "$RUNNER_TEMP/DeveloperIDG2CA.cer" -k "$KEYCHAIN_PATH" -T /usr/bin/codesign || true
          curl -sL "https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer" -o "$RUNNER_TEMP/AppleWWDRCAG3.cer"
          security import "$RUNNER_TEMP/AppleWWDRCAG3.cer" -k "$KEYCHAIN_PATH" -T /usr/bin/codesign || true

          # Import certificate and private key
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"

          # Debug: check P12 contents
          echo "=== P12 file info ==="
          openssl pkcs12 -in "$CERT_PATH" -passin "pass:$APPLE_CERTIFICATE_PASSWORD" -nokeys -clcerts 2>&1 | grep -E "subject|issuer|serial" || true
          echo "=== End P12 info ==="

          security import "$CERT_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Allow codesign to access the keychain
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db /Library/Keychains/System.keychain

          # Debug: check what was imported
          echo "=== Keychain dump (certs) ==="
          security find-certificate -a "$KEYCHAIN_PATH" | grep "labl" || true
          echo "=== Identities (including invalid) ==="
          security find-identity "$KEYCHAIN_PATH" || true
          echo "=== Valid identities ==="
          security find-identity -v "$KEYCHAIN_PATH" || true

          # Clean up cert file
          rm -f "$CERT_PATH" "$RUNNER_TEMP/DeveloperIDG2CA.cer" "$RUNNER_TEMP/AppleWWDRCAG3.cer"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

      - name: Code sign application
        if: env.HAS_APPLE_CERTS == 'true'
        run: |
          APP_PATH="dist/Fllint/Fllint.app"

          # Debug: show all identities in the keychain
          echo "=== All identities in keychain ==="
          security find-identity -v "$KEYCHAIN_PATH" || true
          echo "=== Codesigning identities ==="
          security find-identity -v -p codesigning "$KEYCHAIN_PATH" || true
          echo "=== End identities ==="

          # Find signing identity — try Developer ID Application first, fall back to any codesigning identity
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ -z "$IDENTITY" ]; then
            echo "No 'Developer ID Application' identity found, trying any codesigning identity..."
            IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -v "^$" | grep -v "valid identities found" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          fi
          if [ -z "$IDENTITY" ]; then
            echo "ERROR: No codesigning identity found in keychain"
            echo "Check that APPLE_CERTIFICATE_P12 contains a valid codesigning certificate."
            exit 1
          fi
          echo "Signing with identity: $IDENTITY"

          # Sign all nested binaries and frameworks first (inside-out)

          # Sign Sparkle framework if present
          if [ -d "$APP_PATH/Contents/Frameworks/Sparkle.framework" ]; then
            codesign --force --deep --sign "$IDENTITY" \
              --options runtime \
              --timestamp \
              "$APP_PATH/Contents/Frameworks/Sparkle.framework"
          fi

          # Sign sparkle-helper if present
          if [ -f "$APP_PATH/Contents/MacOS/sparkle-helper" ]; then
            codesign --force --sign "$IDENTITY" \
              --options runtime \
              --timestamp \
              "$APP_PATH/Contents/MacOS/sparkle-helper"
          fi

          # Sign llama-server dylibs
          for dylib in "$APP_PATH/Contents/Resources/bin/"*.dylib; do
            [ -f "$dylib" ] || continue
            codesign --force --sign "$IDENTITY" \
              --options runtime \
              --timestamp \
              "$dylib"
          done

          # Sign llama-server binary
          if [ -f "$APP_PATH/Contents/Resources/bin/llama-server" ]; then
            codesign --force --sign "$IDENTITY" \
              --options runtime \
              --timestamp \
              "$APP_PATH/Contents/Resources/bin/llama-server"
          fi

          # Sign the main binary with entitlements
          codesign --force --sign "$IDENTITY" \
            --options runtime \
            --timestamp \
            --entitlements packaging/macos/entitlements.plist \
            "$APP_PATH/Contents/MacOS/fllint"

          # Sign the entire .app bundle
          codesign --force --deep --sign "$IDENTITY" \
            --options runtime \
            --timestamp \
            --entitlements packaging/macos/entitlements.plist \
            "$APP_PATH"

          # Verify
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          echo "Code signing successful"

      - name: Notarize application
        if: env.HAS_APPLE_CERTS == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          # Create a zip for notarization (separate from the release zip)
          ditto -c -k --keepParent "dist/Fllint/Fllint.app" dist/Fllint-notarize.zip

          # Submit for notarization and wait
          xcrun notarytool submit dist/Fllint-notarize.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait \
            --timeout 600

          # Staple the notarization ticket to the app
          xcrun stapler staple "dist/Fllint/Fllint.app"

          # Verify
          xcrun stapler validate "dist/Fllint/Fllint.app"
          spctl --assess --type execute --verbose "dist/Fllint/Fllint.app"

          # Clean up
          rm -f dist/Fllint-notarize.zip

          echo "Notarization successful"

      - name: Zip distribution folder
        run: cd dist && ditto -c -k --keepParent Fllint Fllint.zip

      - name: Sign update with Sparkle EdDSA
        if: env.SPARKLE_ED_PRIVATE_KEY != ''
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          SIGN_TOOL="packaging/macos/Sparkle.framework/Versions/B/XPCServices/Installer.xpc/Contents/MacOS/sign_update"
          if [ ! -f "$SIGN_TOOL" ]; then
            # Alternative location in some Sparkle versions
            SIGN_TOOL=$(find packaging/macos/Sparkle.framework -name "sign_update" -type f | head -1)
          fi
          if [ -n "$SIGN_TOOL" ] && [ -f "$SIGN_TOOL" ]; then
            RESULT=$("$SIGN_TOOL" dist/Fllint.zip --ed-key-file <(echo "$SPARKLE_ED_PRIVATE_KEY"))
            # Extract signature — sign_update outputs: sparkle:edSignature="..." length="..."
            ED_SIG=$(echo "$RESULT" | grep -o 'sparkle:edSignature="[^"]*"' | cut -d'"' -f2)
            echo "SPARKLE_ED_SIGNATURE=$ED_SIG" >> $GITHUB_ENV
          else
            echo "WARNING: sign_update tool not found, skipping EdDSA signing"
          fi

      - name: Get zip file size
        run: |
          SIZE=$(stat -f%z dist/Fllint.zip)
          echo "ZIP_SIZE=$SIZE" >> $GITHUB_ENV

      - name: Generate appcast entry
        run: |
          DATE=$(date -R 2>/dev/null || date -u +"%a, %d %b %Y %H:%M:%S %z")
          cat > dist/appcast-item.xml << XMLEOF
            <item>
              <title>Version ${VERSION}</title>
              <pubDate>${DATE}</pubDate>
              <sparkle:version>${VERSION}</sparkle:version>
              <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
              <sparkle:minimumSystemVersion>13.0</sparkle:minimumSystemVersion>
              <enclosure
                url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/Fllint.zip"
                type="application/octet-stream"
                sparkle:edSignature="${SPARKLE_ED_SIGNATURE:-UNSIGNED}"
                length="${ZIP_SIZE}"
              />
            </item>
          XMLEOF
          echo "--- Appcast item ---"
          cat dist/appcast-item.xml

      - name: Update appcast.xml
        run: |
          # Use Python to insert the item XML before </channel> (avoids sed multiline issues)
          python3 -c "
          import sys
          item = open('dist/appcast-item.xml').read()
          appcast = open('docs/appcast.xml').read()
          appcast = appcast.replace('</channel>', item + '\n  </channel>')
          open('docs/appcast.xml', 'w').write(appcast)
          "
          echo "--- Updated appcast.xml ---"
          cat docs/appcast.xml

      - name: Commit updated appcast
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git add docs/appcast.xml
          git commit -m "Update appcast.xml for ${GITHUB_REF_NAME}" || echo "No changes to commit"
          git push origin main || echo "WARNING: Could not push appcast update"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Fllint.zip
          draft: true
          generate_release_notes: true

      - name: Clean up keychain
        if: always()
        run: |
          if [ -n "$KEYCHAIN_PATH" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi
